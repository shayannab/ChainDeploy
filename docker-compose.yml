# ─────────────────────────────────────────────────────────
# docker-compose.yml
#
# Orchestrates the ChainDeploy platform.
# Starts the Backend API and a PostgreSQL database.
# ─────────────────────────────────────────────────────────

version: '3.8'

services:
  # The ChainDeploy API
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://chainuser:chainpass@db:5432/chaindeploy
      - SECRET_KEY=replace_this_with_a_long_random_string
    volumes:
      # CRITICAL: This allows the backend to command the host's Docker engine
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage for uploaded ZIPs/Deployments
      - ./data:/app/data
    depends_on:
      - db

  # The Managed Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=chainuser
      - POSTGRES_PASSWORD=chainpass
      - POSTGRES_DB=chaindeploy
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
